name: ImmoRadar - Scraping automatique

on:
  schedule:
    - cron: '0 * * * *'  # Toutes les heures
  workflow_dispatch: {}     # Permet de lancer manuellement

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests schedule anthropic

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 main.py -v

      - name: Push updated data
        run: |
          git config user.name "ImmoRadar Bot"
          git config user.email "bot@immoradar.local"
          git add data/export.json
          git diff --staged --quiet || git commit -m "🏠 Mise à jour automatique des annonces"
          git push
